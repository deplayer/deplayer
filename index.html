    <title>deplayer - Your music, your way | Local-first Media Player</title>

    <meta name="keywords" content="local-first, media player, music player, video player, pwa, progressive web app, webtorrent, subsonic, itunes, youtube-dl, file system access, lyrics, audio spectrum, butterchurn, offline music, cross-device sync">
    <meta name="author" content="deplayer">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://deplayer.app" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://deplayer.app">
    <meta property="og:title" content="deplayer - Your music, your way | Local-first Media Player">
    <meta property="og:description" content="Your music, your way. A local-first media player that puts you in control. Play your music and videos entirely from your browser with support for multiple providers including File System Access, Webtorrent, Subsonic API, iTunes, and youtube-dl-server. Features include PWA support, media session controls, lyrics, and stunning visuals.">
    <meta property="og:image" content="https://deplayer.app/pwa-512x512.png">
    <meta property="og:image:width" content="512">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://deplayer.app">
    <meta property="twitter:title" content="deplayer - Your music, your way | Local-first Media Player">
    <meta property="twitter:description" content="Your music, your way. A local-first media player that puts you in control. Play your music and videos entirely from your browser with support for multiple providers including File System Access, Webtorrent, Subsonic API, iTunes, and youtube-dl-server. Features include PWA support, media session controls, lyrics, and stunning visuals.">
    <meta property="twitter:image" content="https://deplayer.app/pwa-512x512.png">
    
    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "deplayer",
      "description": "Your music, your way. A local-first media player that puts you in control of your personal media collection with support for multiple providers and features like PWA, media session controls, lyrics, and stunning visuals",
      "url": "https://deplayer.app",
      "applicationCategory": "MediaApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "featureList": [
        "Local-first architecture with PGLite storage",
        "Progressive Web App (PWA) support",
        "File System Access API integration",
        "Webtorrent support (magnet links and .torrent files)",
        "Subsonic API integration",
        "iTunes API integration",
        "youtube-dl-server support",
        "Real-time media sharing",
        "Cross-device sync with PostgreSQL",
        "Lyrics support via lyrics.ovh",
        "Audio spectrum visualization",
        "Butterchurn visual effects",
        "Media Session API support",
        "Multi-theme support",
        "Desktop and mobile notifications"
      ]
    }
    </script>
  </head>
  <body class='bg-base-100 text-base-content'>
    <div id="root"></div>
    <div id="modal"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Initialize theme on page load
      const storedTheme = localStorage.getItem('theme');
      if (storedTheme) {
        document.documentElement.setAttribute('data-theme', storedTheme);
      } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const defaultTheme = prefersDark ? 'deplayer' : 'deplayer-light';
        document.documentElement.setAttribute('data-theme', defaultTheme);
        localStorage.setItem('theme', defaultTheme);
      }
    </script>
  </body>
</html>
